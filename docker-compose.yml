version: "3.9"
services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////data/award_finder.db
      CACHE_TTL_MINUTES: "60"
      CORS_ORIGINS: "http://localhost:5173"
      USE_MOCK_FALLBACK: "true"
    volumes:
      - api_data:/data
  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_BASE: http://localhost:8000
    depends_on:
      - api
volumes:
  api_data:
